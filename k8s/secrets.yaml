# ──────────────────────────────────────────────────────────────────────
# Secrets – create before applying the other manifests
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: photo
  labels:
    app.kubernetes.io/part-of: photo-api
type: Opaque
stringData:
  username: guest      # change for production
  password: guest      # change for production
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: photo
  labels:
    app.kubernetes.io/part-of: photo-api
type: Opaque
stringData:
  username: admin      # change for production
  password: admin      # change for production

# ──────────────────────────────────────────────────────────────────────
# Resize API + Dapr sidecar – consumes upload events and resizes images
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: resize-api
  namespace: photo
  labels:
    app.kubernetes.io/name: resize-api
    app.kubernetes.io/part-of: photo-api
spec:
  selector:
    app.kubernetes.io/name: resize-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: dapr-http
      port: 3500
      targetPort: 3500
    - name: dapr-grpc
      port: 50001
      targetPort: 50001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resize-api
  namespace: photo
  labels:
    app.kubernetes.io/name: resize-api
    app.kubernetes.io/part-of: photo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: resize-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resize-api
      annotations:
        # Dapr sidecar injection (if using Dapr operator in the cluster).
        dapr.io/enabled: "true"
        dapr.io/app-id: "resize-api"
        dapr.io/app-port: "8081"
        dapr.io/app-protocol: "grpc"
        dapr.io/log-level: "info"
    spec:
      containers:
        # ── Application container ──
        - name: resize-api
          image: resize-api:latest       # replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SERVICE_NAME
              value: "resize"
            - name: SERVICE_PORT
              value: "8081"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.photo.svc.cluster.local:4317"
            - name: EMULATED_STORAGE_URL
              value: "http://blobemu.photo.svc.cluster.local:10000"
            - name: IMAGES_CONTAINER_NAME
              value: "images"
            - name: MAX_IMAGE_HEIGHT
              value: "1200"
            - name: MAX_IMAGE_WIDTH
              value: "1600"
            - name: UPLOADS_QUEUE_BINDING
              value: "queue-uploads"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi

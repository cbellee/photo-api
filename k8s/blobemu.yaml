# ──────────────────────────────────────────────────────────────────────
# Blob Emulator – lightweight Azure Blob Storage replacement
# ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: blobemu
  namespace: photo
  labels:
    app.kubernetes.io/name: blobemu
    app.kubernetes.io/part-of: photo-api
spec:
  selector:
    app.kubernetes.io/name: blobemu
  ports:
    - name: http
      port: 10000
      targetPort: 10000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blobemu
  namespace: photo
  labels:
    app.kubernetes.io/name: blobemu
    app.kubernetes.io/part-of: photo-api
spec:
  serviceName: blobemu
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blobemu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blobemu
    spec:
      containers:
        - name: blobemu
          image: blobemu:latest          # replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 10000
              name: http
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq.photo.svc.cluster.local:5672/"
            - name: RABBITMQ_EXCHANGE
              value: "blob-events"
            - name: RABBITMQ_ROUTING_KEY
              value: "blob.created"
            - name: RABBITMQ_QUEUE
              value: "blob-events"
            - name: BLOB_PUBLIC_URL
              value: "http://blobemu.photo.svc.cluster.local:10000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: blobemu-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: blobemu-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

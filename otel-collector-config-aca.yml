# OpenTelemetry Collector configuration for Azure Container Apps.
# Receives OTLP from the app sidecar on localhost:4317 and exports
# traces, metrics, and logs to Azure Blob Storage.
#
# Requires the contrib collector image: otel/opentelemetry-collector-contrib
# Environment variables:
# AZURE_STORAGE_CONNECTION_STRING – storage account connection string

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert

exporters:
  azureblob:
    auth:
      type: connection_string
      connection_string: ${env:AZURE_STORAGE_CONNECTION_STRING}
    container:
      traces: telemetry
      metrics: telemetry
      logs: telemetry
    blob_name_format:
      traces_format: "traces/2006/01/02/traces_15_04_05.json"
      metrics_format: "metrics/2006/01/02/metrics_15_04_05.json"
      logs_format: "logs/2006/01/02/logs_15_04_05.json"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [azureblob]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [azureblob]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [azureblob]
